<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Best Friend 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000428, #004e92);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* glowing title */
h1 {
  margin-top: 20px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px cyan; }
  to { text-shadow: 0 0 25px blue; }
}

/* subtitle */
p {
  font-size: 18px;
}

/* photo gallery */
.gallery {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 20px;
  gap: 15px;
}

.gallery img {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 15px;
  box-shadow: 0 0 15px cyan;
  animation: zoom 3s infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.08); }
}

/* card */
.card {
  background: rgba(255,255,255,0.1);
  width: 80%;
  max-width: 500px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 15px cyan;
}

/* floating hearts */
.heart {
  position: absolute;
  top: -10px;
  color: red;
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
}

/* music */
audio {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>💙 My Best Friend 💙</h1>
<p>True friendship never ends ✨</p>

<!-- MUSIC -->
<audio controls autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- CARD -->
<div class="card">
  “A best friend is someone who makes you laugh even when you don’t want to smile 💫”
</div>

<!-- PHOTO GALLERY -->
<div class="gallery">
  <img src="img1.jpg">
  <img src="img2.jpg">
  <img src="img3.jpg">
</div>

<script>
// falling hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💙";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
